name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --include=dev
      - run: npm run lint
      - run: npm test

  publish:
    name: Publish to npm
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --include=dev
      - name: Publish without devDependencies
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" >> .npmrc
          node -e "const p=require('./package.json'); delete p.devDependencies; require('fs').writeFileSync('package.json', JSON.stringify(p,null,2)+'\n');"
          npm publish --ignore-scripts
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  github-release:
    name: GitHub Release
    needs: [ci, publish]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
      - name: Publish existing draft or create from CHANGELOG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="v${VERSION}"

          # Check if a draft release already exists for this tag
          DRAFT_ID=$(gh release list --json tagName,isDraft,databaseId \
            --jq ".[] | select(.tagName==\"${TAG}\" and .isDraft) | .databaseId" 2>/dev/null || true)

          if [ -n "$DRAFT_ID" ]; then
            # Promote the draft to published
            gh release edit "${TAG}" --draft=false
            echo "✅ Published existing draft release ${TAG}"
          else
            # Fallback: build notes from CHANGELOG.md
            awk "/^## ${VERSION}/{found=1; next} /^## /{if(found) exit} found{print}" CHANGELOG.md > release-notes.md
            if [ ! -s release-notes.md ]; then
              echo "Release ${TAG}" > release-notes.md
            fi
            gh release create "${TAG}" --title "${TAG}" --notes-file release-notes.md
            echo "✅ Created release ${TAG} from CHANGELOG.md"
          fi
